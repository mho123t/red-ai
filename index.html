<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأمانة للخضار والفواكه | Al Amana Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #1a4d15; --g: #d4af37; --d: #0a2409; --l: #f4f7f4; --w: #ffffff; --r: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--l); color: var(--d); transition: 0.3s; }
        
        .marquee { background: linear-gradient(90deg, #000, var(--g), var(--p)); color: white; padding: 12px; overflow: hidden; white-space: nowrap; font-weight: bold; }
        .marquee div { display: inline-block; animation: scroll 25s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { background: var(--w); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        .logo { font-size: 1.6rem; font-weight: 900; color: var(--p); }
        .logo span { color: var(--g); }
        
        .btn-ux { background: var(--p); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-ux:hover { background: var(--g); transform: scale(1.05); }

        .tabs { display: flex; justify-content: center; gap: 10px; padding: 25px; flex-wrap: wrap; }
        .tab { background: white; border: 2px solid var(--p); padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab.active { background: var(--p); color: white; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 0 5% 50px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; transition: 0.3s; border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); border-color: var(--g); }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-body select, .card-body input { width: 100%; margin: 5px 0; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
        .add-btn { background: var(--p); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .sidebar { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; z-index: 2000; padding: 25px; box-shadow: -5px 0 20px rgba(0,0,0,0.2); transition: 0.5s; overflow-y: auto; }
        .sidebar.open { right: 0; }
        .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; align-items: center; }
        .del { color: var(--r); cursor: pointer; font-size: 1.2rem; margin-right: 10px; }
        
        .form { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .form select, .form input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; }
        .wa { background: #25D366; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body id="body">

    <div class="marquee">
        <div>🇦🇪 دام عزك يا وطن - اللهم اجعل هذا البلد آمناً مطمئناً 🇦🇪 أسعارنا تنافسية وجودة الأمانة تصلكم لكل بيت في الإمارات 🇦🇪 توصيل لجميع الإمارات: عجمان، دبي، أبوظبي، الشارقة، رأس الخيمة، أم القيوين، الفجيرة 🇦🇪</div>
    </div>

    <header>
        <div class="logo">الأمانة <span>للخضار والفواكه</span></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-ux" onclick="changeLang()" id="langBtn">English</button>
            <button class="btn-ux" onclick="openCart()"><i class="fas fa-shopping-cart"></i> (<span id="count">0</span>)</button>
        </div>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="load('veg', this)" id="tabVeg">خضروات</button>
        <button class="tab" onclick="load('fruit', this)" id="tabFruit">فواكه</button>
        <button class="tab" onclick="load('leaf', this)" id="tabLeaf">ورقيات</button>
    </div>

    <div id="grid" class="grid"></div>

    <div class="sidebar" id="cart">
        <h2 id="cartH">سلة الطلبات</h2>
        <div id="cartContent" style="margin: 20px 0;">السلة فارغة</div>
        <div class="form">
            <select id="area">
                <option value="عجمان">عجمان</option><option value="دبي">دبي</option>
                <option value="أبوظبي">أبوظبي</option><option value="الشارقة">الشارقة</option>
                <option value="رأس الخيمة">رأس الخيمة</option><option value="أم القيوين">أم القيوين</option><option value="الفجيرة">الفجيرة</option>
            </select>
            <input type="text" id="addr" placeholder="العنوان بالتفصيل">
            <button class="wa" onclick="send()">إرسال الطلب عبر واتساب</button>
            <button onclick="openCart()" style="border:none; padding:10px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script>
        const data = {
            veg: [
                {n: 'طماطم', e: 'Tomato', img: 'https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=200', u: ['كيلو', 'صندوق']},
                {n: 'خيار', e: 'Cucumber', img: 'https://images.unsplash.com/photo-1449300079323-02e209d9d02e?w=200', u: ['كيلو', 'صندوق']},
                {n: 'بطاطس', e: 'Potato', img: 'https://images.unsplash.com/photo-1518977676601-b53f02ac6d5d?w=200', u: ['كيلو', 'صندوق']},
                {n: 'بصل أحمر', e: 'Red Onion', img: 'https://images.unsplash.com/photo-1618512496248-a07fe8376321?w=200', u: ['كيلو', 'صندوق']},
                {n: 'بصل أبيض', e: 'White Onion', img: 'https://images.unsplash.com/photo-1580201092675-a0a6a6cafbb1?w=200', u: ['كيلو', 'صندوق']},
                {n: 'باذنجان', e: 'Eggplant', img: 'https://images.unsplash.com/photo-1615485290382-441e4d0c9cb5?w=200', u: ['كيلو', 'صندوق']},
                {n: 'كوسا', e: 'Zucchini', img: 'https://images.unsplash.com/photo-1599307767316-776533da941c?w=200', u: ['كيلو', 'صندوق']},
                {n: 'جزر', e: 'Carrot', img: 'https://images.unsplash.com/photo-1598170845058-32b9d6a5da37?w=200', u: ['كيلو', 'صندوق']},
                {n: 'فلفل بارد', e: 'Capsicum', img: 'https://images.unsplash.com/photo-1563565312874-84399f475ee3?w=200', u: ['كيلو', 'صندوق']},
                {n: 'ثوم', e: 'Garlic', img: 'https://images.unsplash.com/photo-1583600193724-6cd4e466395b?w=200', u: ['كيلو', 'صندوق']},
                {n: 'زنجبيل', e: 'Ginger', img: 'https://images.unsplash.com/photo-1599940824399-b87987ceb72a?w=200', u: ['كيلو']},
                {n: 'قرنبيط', e: 'Cauliflower', img: 'https://images.unsplash.com/photo-1568584711075-3d021a7c3ec3?w=200', u: ['كيلو', 'حبة']},
                {n: 'ملفوف', e: 'Cabbage', img: 'https://images.unsplash.com/photo-1591584250647-39eb67c13ff3?w=200', u: ['كيلو', 'حبة']},
                {n: 'بروكلي', e: 'Broccoli', img: 'https://images.unsplash.com/photo-1459411621453-7b03977f4bfc?w=200', u: ['كيلو']},
                {n: 'فاصولياء', e: 'Beans', img: 'https://images.unsplash.com/photo-1567375639018-80e30925282d?w=200', u: ['كيلو']},
                {n: 'فجل', e: 'Radish', img: 'https://images.unsplash.com/photo-1590212151175-e58edd96185b?w=200', u: ['كيلو', 'ربطة']},
                {n: 'بطاطا حلوة', e: 'Sweet Potato', img: 'https://images.unsplash.com/photo-1596040033229-a9821ebd058d?w=200', u: ['كيلو', 'صندوق']}
            ],
            fruit: [
                {n: 'تفاح أحمر', e: 'Red Apple', img: 'https://images.unsplash.com/photo-1560806887-1e4cd0b6bcd6?w=200', u: ['كيلو', 'صندوق']},
                {n: 'تفاح أخضر', e: 'Green Apple', img: 'https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=200', u: ['كيلو', 'صندوق']},
                {n: 'موز', e: 'Banana', img: 'https://images.unsplash.com/photo-1571771894821-ad9902d83f4e?w=200', u: ['كيلو', 'صندوق']},
                {n: 'برتقال عصير', e: 'Orange', img: 'https://images.unsplash.com/photo-1547514701-42782101795e?w=200', u: ['كيلو', 'صندوق']},
                {n: 'مانجو', e: 'Mango', img: 'https://images.unsplash.com/photo-1553279768-865429fa0078?w=200', u: ['كيلو', 'صندوق']},
                {n: 'عنب', e: 'Grapes', img: 'https://images.unsplash.com/photo-1533616688419-b7a585564566?w=200', u: ['كيلو', 'صندوق']},
                {n: 'فراولة', e: 'Strawberry', img: 'https://images.unsplash.com/photo-1464965911861-746a04b4bca6?w=200', u: ['علبة', 'كرتون']},
                {n: 'أناناس', e: 'Pineapple', img: 'https://images.unsplash.com/photo-1550258987-190a2d41a8ba?w=200', u: ['حبة']},
                {n: 'بطيخ', e: 'Watermelon', img: 'https://images.unsplash.com/photo-1589927986089-35812388d1f4?w=200', u: ['كيلو', 'حبة']},
                {n: 'شمام', e: 'Melon', img: 'https://images.unsplash.com/photo-1571575173700-afb9492e6a50?w=200', u: ['حبة']},
                {n: 'كيوي', e: 'Kiwi', img: 'https://images.unsplash.com/photo-1585059895524-72359e061381?w=200', u: ['كيلو', 'علبة']},
                {n: 'ليمون', e: 'Lemon', img: 'https://images.unsplash.com/photo-1590502593747-42a996133562?w=200', u: ['كيلو', 'كيس']}
            ],
            leaf: [
                {n: 'كزبرة', e: 'Coriander', img: 'https://images.unsplash.com/photo-1585320806297-9794b3e4
            leaf: [
                {n: 'كزبرة', e: 'Coriander', img: 'https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?w=200', u: ['ربطة']},
                {n: 'بقدونس', e: 'Parsley', img: 'https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?w=200', u: ['ربطة']},
                {n: 'جرجير', e: 'Arugula', img: 'https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?w=200', u: ['ربطة']},
                {n: 'نعناع', e: 'Mint', img: 'https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?w=200', u: ['ربطة']},
                {n: 'شبت', e: 'Dill', img: 'https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?w=200', u: ['ربطة']},
                {n: 'خس', e: 'Lettuce', img: 'https://images.unsplash.com/photo-1622145804867-0896700af0a2?w=200', u: ['حبة', 'صندوق']},
                {n: 'سبانخ', e: 'Spinach', img: 'https://images.unsplash.com/photo-1576045057995-568f588f82fb?w=200', u: ['كيلو', 'ربطة']},
                {n: 'زعتر أخضر', e: 'Thyme', img: 'https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?w=200', u: ['ربطة']},
                {n: 'بصل أخضر', e: 'Green Onion', img: 'https://images.unsplash.com/photo-1514330364977-80946059e0a0?w=200', u: ['ربطة']}
            ]
        };

        let cart = [];
        let lang = 'ar';
        let currentCat = 'veg';

        function load(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            data[currentCat].forEach((p, i) => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.img}">
                        <div class="card-body">
                            <h3>${lang === 'ar' ? p.n : p.e}</h3>
                            <select id="u-${i}">${p.u.map(x => `<option>${x}</option>`).join('')}</select>
                            <input type="number" id="q-${i}" value="1" min="1">
                            <button class="add-btn" onclick="add(${i})">${lang === 'ar' ? 'أضف للسلة' : 'Add to Cart'}</button>
                        </div>
                    </div>`;
            });
        }

        function add(i) {
            const p = data[currentCat][i];
            const u = document.getElementById('u-'+i).value;
            const q = document.getElementById('q-'+i).value;
            cart.push({ n: p.n, e: p.e, u, q, id: Date.now() });
            update();
        }

        function remove(id) {
            cart = cart.filter(x => x.id !== id);
            update();
        }

        function update() {
            document.getElementById('count').innerText = cart.length;
            const content = document.getElementById('cartContent');
            if (cart.length === 0) {
                content.innerText = lang === 'ar' ? "السلة فارغة" : "Cart is empty";
                return;
            }
            content.innerHTML = cart.map(x => `
                <div class="item">
                    <span>${lang === 'ar' ? x.n : x.e} (${x.q} ${x.u})</span>
                    <i class="fas fa-trash del" onclick="remove(${x.id})"></i>
                </div>`).join('');
        }

        function openCart() {
            document.getElementById('cart').classList.toggle('open');
        }

        function send() {
            if (cart.length === 0) return alert("السلة فارغة!");
            const area = document.getElementById('area').value;
            const addr = document.getElementById('addr').value;
            let msg = `طلب جديد من الأمانة:\n`;
            cart.forEach(x => msg += `- ${x.n}: ${x.q} ${x.u}\n`);
            msg += `\n📍 الإمارات: ${area}\n🏠 العنوان: ${addr}`;
            window.open(`https://wa.me/971501577629?text=${encodeURIComponent(msg)}`);
        }

        function changeLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            document.getElementById('langBtn').innerText = lang === 'ar' ? 'English' : 'عربي';
            document.getElementById('cartH').innerText = lang === 'ar' ? 'سلة الطلبات' : 'Shopping Cart';
            render();
            update();
        }

        window.onload = render;
    </script>
</body>
</html>
